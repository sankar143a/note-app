<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Notes</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📝 My Notes</h1>
            <div class="header-actions">
                <button class="btn btn-primary" id="newNoteBtn">+ New Note</button>
                <button class="btn btn-secondary" id="logoutBtn">Logout</button>
            </div>
        </div>
        
        <!-- Search and Filter Bar -->
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="🔍 Search notes..." class="search-input">
            <select id="sortSelect" class="sort-select">
                <option value="newest">Newest First</option>
                <option value="oldest">Oldest First</option>
                <option value="title">Title A-Z</option>
            </select>
        </div>
        
        <!-- Tags Filter -->
        <div class="tags-filter" id="tagsFilter"></div>
        
        <!-- Notes Grid -->
        <div id="noteGrid" class="note-grid"></div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div class="modal" id="deleteModal">
        <div class="modal-content">
            <h3>Delete Note?</h3>
            <p id="deleteNoteTitle"></p>
            <div class="modal-actions">
                <button class="btn btn-secondary" id="cancelDelete">Cancel</button>
                <button class="btn btn-danger" id="confirmDelete">Delete</button>
            </div>
        </div>
    </div>

    <script src="js/dashboard-enhanced.js"></script>
</body>
</html>
