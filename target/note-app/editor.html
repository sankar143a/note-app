<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Note</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Add Quill editor CSS -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
</head>
<body>
    <div class="editor-container">
        <input type="text" id="noteTitle" class="editor-title" placeholder="Note title">
        
        <!-- Rich text editor toolbar -->
        <div id="toolbar">
            <span class="ql-formats">
                <select class="ql-font"></select>
                <select class="ql-size"></select>
            </span>
            <span class="ql-formats">
                <button class="ql-bold"></button>
                <button class="ql-italic"></button>
                <button class="ql-underline"></button>
                <button class="ql-strike"></button>
            </span>
            <span class="ql-formats">
                <select class="ql-color"></select>
                <select class="ql-background"></select>
            </span>
            <span class="ql-formats">
                <button class="ql-list" value="ordered"></button>
                <button class="ql-list" value="bullet"></button>
                <button class="ql-indent" value="-1"></button>
                <button class="ql-indent" value="+1"></button>
            </span>
            <span class="ql-formats">
                <button class="ql-link"></button>
                <button class="ql-image"></button>
                <button class="ql-code-block"></button>
            </span>
        </div>
        
        <!-- Editor container -->
        <div id="editor" class="rich-editor"></div>
        
        <div class="status-bar">
            <div class="save-status" id="saveStatus">💾 Ready to save</div>
            <div class="tag-container" id="tagContainer"></div>
            <div class="editor-actions">
                <button class="btn btn-primary" id="saveBtn">Save Note</button>
                <button class="btn btn-secondary" id="backBtn">← All Notes</button>
            </div>
        </div>
    </div>
    
    <!-- Add Quill editor JS -->
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="js/editor-rich.js"></script>
</body>
</html>
